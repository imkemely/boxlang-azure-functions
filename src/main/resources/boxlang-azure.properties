# ============================================================
# BoxLang Azure Functions Runtime Configuration
# ============================================================
# Values in this file serve as defaults.
# Any property can be overridden at deploy time by setting an
# Azure Application Setting whose name is the property key
# with dots/hyphens replaced by underscores and upper-cased.
#
# Example:
#   boxlang.runtime.scriptPath  →  BOXLANG_RUNTIME_SCRIPTPATH
# ============================================================

# ----------------------------------------------------------
# Runtime paths
# ----------------------------------------------------------

# Absolute path where BoxLang scripts (.bx / .cfm) are stored
# on the Azure Functions host filesystem.
# Azure App Service mounts the wwwroot at /home/site/wwwroot.
boxlang.runtime.scriptPath=/home/site/wwwroot/scripts

# Additional classpath entries scanned by the BoxLang class loader.
# Useful when pre-compiled BoxLang classes are deployed alongside scripts.
boxlang.runtime.classPath=/home/site/wwwroot/classes

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------

# Root log level forwarded to the BoxLang runtime.
# Accepted values: TRACE, DEBUG, INFO, WARN, ERROR
# Azure Application Insights captures all output regardless of this level;
# lower levels increase verbosity and cost.
boxlang.runtime.logLevel=INFO

# ----------------------------------------------------------
# Azure-specific tuning
# ----------------------------------------------------------

# When true, the BoxLang runtime is initialised during class loading
# (before the first request arrives) rather than on the first invocation.
# This hides the 3-5 second startup cost from real traffic at the price of
# slightly longer cold-start times for the Azure worker process itself.
# Recommended: true for production, false for local development iteration.
boxlang.azure.coldStartOptimization=true

# When true, compiled BoxLang script bytecode is kept in an in-memory
# LRU cache between invocations.  Cache hits avoid re-parsing and
# re-compiling on every warm request (target: warm p95 < 500 ms).
# Disable during development to pick up script changes without redeploying.
boxlang.azure.runtimeCacheEnabled=true

# Soft upper bound on the number of requests handled concurrently by a
# single function instance.  Azure Functions may spin up additional
# instances when this limit is reached.
# Adjust based on available memory and expected payload sizes.
boxlang.azure.maxConcurrentRequests=100
